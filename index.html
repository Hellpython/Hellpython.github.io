<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hellpython</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1f2937;
        --muted: #64748b;
        --line: #d8dee9;
        --paper: #f8fafc;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 34rem),
          linear-gradient(135deg, #ffffff 0%, var(--paper) 100%);
      }

      main {
        width: min(960px, calc(100% - 40px));
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        align-content: center;
        gap: 28px;
        padding: 64px 0;
      }

      .eyebrow {
        width: fit-content;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.7);
      }

      h1 {
        max-width: 780px;
        margin: 0;
        font-size: clamp(44px, 9vw, 96px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        max-width: 640px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(18px, 2vw, 22px);
        line-height: 1.7;
      }

      a {
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Hellpython.github.io</div>
      <h1>Hello, GitHub Pages.</h1>
      <p>
        이곳은 Hellpython의 GitHub Pages 첫 페이지입니다.
        앞으로 블로그, 프로젝트 기록, 실험 노트를 차근차근 채워갈 수 있습니다.
      </p>
      <p>
        저장소:
        <a href="https://github.com/Hellpython/Hellpython.github.io">github.com/Hellpython/Hellpython.github.io</a>
      </p>
    </main>
  </body>
</html>
