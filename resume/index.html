<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="양희찬 이력서입니다.">
    <title>Resume | Hellpython</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1f2937;
        --muted: #64748b;
        --line: #d8dee9;
        --paper: #f8fafc;
        --accent: #0f766e;
        --accent-dark: #115e59;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 32rem),
          linear-gradient(135deg, #ffffff 0%, var(--paper) 100%);
      }

      main {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      .header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 14px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: clamp(36px, 7vw, 72px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        padding: 0 14px;
        border: 1px solid var(--accent);
        border-radius: 8px;
        background: var(--accent);
        color: #ffffff;
        font-size: 14px;
        font-weight: 800;
        text-decoration: none;
      }

      .button.secondary {
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.76);
        color: var(--accent-dark);
      }

      .viewer {
        width: 100%;
        height: min(1120px, calc(100vh - 152px));
        min-height: 720px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 16px 48px rgba(15, 23, 42, 0.08);
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .fallback {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .fallback a {
        color: var(--accent);
        font-weight: 800;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 24px, 1080px);
          padding: 24px 0;
        }

        .header {
          align-items: flex-start;
          flex-direction: column;
        }

        .actions {
          justify-content: flex-start;
        }

        .viewer {
          height: calc(100vh - 188px);
          min-height: 560px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="header">
        <div>
          <p class="eyebrow">Hellpython.github.io</p>
          <h1>Resume</h1>
        </div>
        <nav class="actions" aria-label="Resume navigation">
          <a class="button secondary" href="/">Dev Log</a>
          <a class="button" href="yang-heechan-resume.pdf">PDF 다운로드</a>
        </nav>
      </header>

      <div class="viewer">
        <iframe src="yang-heechan-resume.pdf" title="양희찬 이력서 PDF"></iframe>
      </div>
      <p class="fallback">
        PDF가 보이지 않으면
        <a href="yang-heechan-resume.pdf">여기에서 이력서를 열 수 있습니다.</a>
      </p>
    </main>
  </body>
</html>
